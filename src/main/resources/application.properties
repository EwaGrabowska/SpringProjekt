spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
spring.mvc.static-path-pattern=/resources/**
spring.resources.chain.strategy.content.enabled=true
spring.resources.chain.strategy.content.paths=/**
server.tomcat.additional-tld-skip-patterns=hk2-utils.jar,javax.annotation-api.jar,javax.inject.jar,hk2-api.jar,config-types.jar,hk2-core.jar,hk2-config.jar,tiger-types.jar,validation-api.jar,jboss-logging.jar,classmate.jar,hk2-locator.jar,javassist.jar,hk2-runlevel.jar,class-model.jar,asm-all-repackaged.jar
server.port=5000
spring.profiles.active=aws_ebs
mail.transport.protocol=smtp
mail.smtp.port=587
mail.smtp.starttls.enable=true
mail.smtp.auth=true

spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
hibernate.id.new_generator_mappings=false
spring.jpa.hibernate.ddl-auto=update
hibernate.jdbc.batch_size=50

spring.messages.always-use-message-format=false
spring.messages.basename=messages
spring.messages.cache-duration=-1
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR
logging.level.com.spring.start.springProjekt=DEBUG

#PASSWORDS and assess to data base
#To run up application on your localhost set your data:
amazon.S3.accessKey=Your AWS access key.
amazon.S3.secretKey=Your AWS access secret key.
amazon.SES.username=Your Amazon SES SMTP user name.
amazon.SES.userpassword=Your Amazon SES SMTP password.

email=Your email adress used for sending emails with activation codes.
amazon.EB.domain=Domain for Amazon Elastic Beanstalk.

spring.datasource.url=Your database URL address.
spring.datasource.username=Your user name used for authentication in the database.
spring.datasource.password=Your password used for authentication in the database.




